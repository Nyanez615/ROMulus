name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ROMulus ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG.md](https://github.com/Nyanez615/ROMulus/blob/main/CHANGELOG.md) for details.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  updater-json:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          mkdir -p bundles

          # Download the platform bundles tauri-action already uploaded
          gh release download "${TAG}" --dir bundles/ \
            --pattern "ROMulus_universal.app.tar.gz" \
            --pattern "ROMulus_${VERSION}_amd64.AppImage" \
            --pattern "ROMulus_${VERSION}_x64-setup.exe"

          echo "Downloaded:"
          ls -la bundles/

          # Tauri v2 updater requires .AppImage.tar.gz for Linux and .nsis.zip for Windows.
          # Wrap the plain bundles into the expected archive formats.
          tar -czf "bundles/ROMulus_${VERSION}_amd64.AppImage.tar.gz" \
            -C bundles "ROMulus_${VERSION}_amd64.AppImage"
          (cd bundles && zip "ROMulus_${VERSION}_x64-setup.nsis.zip" \
            "ROMulus_${VERSION}_x64-setup.exe")

          # Sign all updater bundles (TAURI_SIGNING_PRIVATE_KEY is base64-encoded)
          for bundle in \
            "bundles/ROMulus_universal.app.tar.gz" \
            "bundles/ROMulus_${VERSION}_amd64.AppImage.tar.gz" \
            "bundles/ROMulus_${VERSION}_x64-setup.nsis.zip"; do
            echo "Signing: $bundle"
            npx @tauri-apps/cli signer sign "$bundle"
          done

          echo "Signatures:"
          ls bundles/*.sig

          # Upload the Linux and Windows updater archives (macOS ones are already in the release)
          gh release upload "${TAG}" \
            "bundles/ROMulus_${VERSION}_amd64.AppImage.tar.gz" \
            "bundles/ROMulus_${VERSION}_x64-setup.nsis.zip" \
            --clobber

          python3 - << 'EOF'
          import json, subprocess, sys
          from datetime import datetime, timezone

          tag = "${{ github.ref_name }}"
          version = tag.lstrip("v")
          base = f"https://github.com/Nyanez615/ROMulus/releases/download/{tag}"

          def read_sig(path):
              try:
                  return open(path).read().strip()
              except FileNotFoundError:
                  print(f"ERROR: {path} not found")
                  return None

          universal_sig = read_sig("bundles/ROMulus_universal.app.tar.gz.sig")
          sigs = {
              "darwin-universal": universal_sig,
              "linux-x86_64":     read_sig(f"bundles/ROMulus_{version}_amd64.AppImage.tar.gz.sig"),
              "windows-x86_64":   read_sig(f"bundles/ROMulus_{version}_x64-setup.nsis.zip.sig"),
          }

          missing = [k for k, v in sigs.items() if not v]
          if missing:
              print(f"ERROR: Missing signatures for: {missing}")
              sys.exit(1)

          # Point both darwin targets at the same universal bundle so the updater
          # serves the right file regardless of which architecture is running.
          data = {
              "version": version,
              "notes": "See https://github.com/Nyanez615/ROMulus/blob/main/CHANGELOG.md for details.",
              "pub_date": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "platforms": {
                  "darwin-aarch64": {
                      "signature": sigs["darwin-universal"],
                      "url": f"{base}/ROMulus_universal.app.tar.gz",
                  },
                  "darwin-x86_64": {
                      "signature": sigs["darwin-universal"],
                      "url": f"{base}/ROMulus_universal.app.tar.gz",
                  },
                  "linux-x86_64": {
                      "signature": sigs["linux-x86_64"],
                      "url": f"{base}/ROMulus_{version}_amd64.AppImage.tar.gz",
                  },
                  "windows-x86_64": {
                      "signature": sigs["windows-x86_64"],
                      "url": f"{base}/ROMulus_{version}_x64-setup.nsis.zip",
                  },
              },
          }

          with open("latest.json", "w") as f:
              json.dump(data, f, indent=2)

          print(json.dumps(data, indent=2))
          subprocess.run(["gh", "release", "upload", tag, "latest.json", "--clobber"], check=True)
          print("Uploaded latest.json")
          EOF
