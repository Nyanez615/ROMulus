name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            artifact_name: "updater-macos-aarch64"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            artifact_name: "updater-macos-x86_64"
          - platform: ubuntu-22.04
            args: ""
            artifact_name: "updater-linux-x86_64"
          - platform: windows-latest
            args: ""
            artifact_name: "updater-windows-x86_64"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ROMulus ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG.md](https://github.com/Nyanez615/ROMulus/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Collect macOS aarch64 updater artifact
        if: matrix.platform == 'macos-latest' && contains(matrix.args, 'aarch64')
        run: |
          mkdir -p updater
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/macos/ROMulus.app.tar.gz \
             updater/ROMulus_aarch64.app.tar.gz
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/macos/ROMulus.app.tar.gz.sig \
             updater/ROMulus_aarch64.app.tar.gz.sig

      - name: Collect macOS x86_64 updater artifact
        if: matrix.platform == 'macos-latest' && contains(matrix.args, 'x86_64')
        run: |
          mkdir -p updater
          cp src-tauri/target/x86_64-apple-darwin/release/bundle/macos/ROMulus.app.tar.gz \
             updater/ROMulus_x64.app.tar.gz
          cp src-tauri/target/x86_64-apple-darwin/release/bundle/macos/ROMulus.app.tar.gz.sig \
             updater/ROMulus_x64.app.tar.gz.sig

      - name: Collect Linux updater artifact
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p updater
          cp src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz updater/
          cp src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig updater/

      - name: Collect Windows updater artifact
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          mkdir -p updater
          cp src-tauri/target/release/bundle/nsis/*.nsis.zip updater/
          cp src-tauri/target/release/bundle/nsis/*.nsis.zip.sig updater/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: updater/
          if-no-files-found: error

  updater-json:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: updater-*
          path: bundles
          merge-multiple: true

      - name: List bundles
        run: find bundles -type f | sort

      - name: Upload Linux/Windows updater bundles to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          find bundles -type f \( -name "*.AppImage.tar.gz" -o -name "*.nsis.zip" \) \
            -exec gh release upload "${TAG}" {} --clobber \;

      - name: Assemble and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - << 'EOF'
          import json, subprocess, glob, sys
          from datetime import datetime, timezone

          tag = "${{ github.ref_name }}"
          version = tag.lstrip("v")
          base = f"https://github.com/Nyanez615/ROMulus/releases/download/{tag}"

          def read_sig(path):
              try:
                  return open(path).read().strip()
              except FileNotFoundError:
                  print(f"WARNING: {path} not found")
                  return ""

          linux_matches = glob.glob(f"bundles/*_{version}_amd64.AppImage.tar.gz")
          linux_name = linux_matches[0].split("/")[-1] if linux_matches else f"ROMulus_{version}_amd64.AppImage.tar.gz"

          win_matches = glob.glob(f"bundles/*_{version}_x64-setup.nsis.zip")
          win_name = win_matches[0].split("/")[-1] if win_matches else f"ROMulus_{version}_x64-setup.nsis.zip"

          data = {
              "version": version,
              "notes": "See https://github.com/Nyanez615/ROMulus/blob/main/CHANGELOG.md for details.",
              "pub_date": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "platforms": {
                  "darwin-aarch64": {
                      "signature": read_sig("bundles/ROMulus_aarch64.app.tar.gz.sig"),
                      "url": f"{base}/ROMulus_aarch64.app.tar.gz",
                  },
                  "darwin-x86_64": {
                      "signature": read_sig("bundles/ROMulus_x64.app.tar.gz.sig"),
                      "url": f"{base}/ROMulus_x64.app.tar.gz",
                  },
                  "linux-x86_64": {
                      "signature": read_sig(f"bundles/{linux_name}.sig"),
                      "url": f"{base}/{linux_name}",
                  },
                  "windows-x86_64": {
                      "signature": read_sig(f"bundles/{win_name}.sig"),
                      "url": f"{base}/{win_name}",
                  },
              },
          }

          missing = [k for k, v in data["platforms"].items() if not v["signature"]]
          if missing:
              print(f"ERROR: Missing signatures for platforms: {missing}")
              sys.exit(1)

          with open("latest.json", "w") as f:
              json.dump(data, f, indent=2)

          print(json.dumps(data, indent=2))
          subprocess.run(["gh", "release", "upload", tag, "latest.json", "--clobber"], check=True)
          print("Uploaded latest.json")
          EOF
